<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="以視覺化介面建立 Novae 提案分類設定，並下載 issue-categories.config.json。" />
    <title>分類設定產生器｜Novae</title>
    <script type="module" src="/src/category-builder.js"></script>
  </head>
  <body class="builder-page">
    <a class="skip-link" href="#builder-main">跳到設定產生器</a>
    <header class="site-header builder-header">
      <a class="brand" href="./" aria-label="Novae 首頁"><span class="brand-mark"><img src="./logo.svg" alt="" /></span></a>
      <nav aria-label="主要導覽"><a href="./">首頁</a><a href="./docs/">文件</a><a class="is-active" href="./category-builder.html">設定產生器</a></nav>
      <a class="button button-small button-dark" href="./docs/configuration.html">設定文件 <i class="ti ti-arrow-right" aria-hidden="true"></i></a>
    </header>

    <main id="builder-main">
      <section class="builder-hero">
        <div>
          <p class="section-number">VISUAL CONFIG BUILDER</p>
          <h1>把分類規則，<br /><em>直接組成設定檔。</em></h1>
        </div>
        <div class="builder-hero__copy">
          <p>依主程式實際支援的 schema 編輯分類、閱讀範圍、作者顯示、附議與回應期限；完成後下載檔案，覆蓋專案中的 <code>config/issue-categories.config.json</code>。</p>
          <div><span>校內登入固定必要</span><span>純前端處理</span><span>不會上傳設定</span></div>
        </div>
      </section>

      <section class="builder-shell" data-category-builder>
        <div class="builder-toolbar">
          <div>
            <button class="button button-primary" type="button" data-add-category><i class="ti ti-plus" aria-hidden="true"></i>新增分類</button>
            <label class="button button-secondary builder-import">匯入 JSON<input type="file" accept="application/json,.json" data-import-config /></label>
          </div>
          <button class="button button-dark" type="button" data-download-config>下載設定檔</button>
        </div>

        <div class="builder-workspace">
          <aside class="builder-categories" aria-label="分類清單">
            <div class="builder-categories__head"><span>分類</span><strong data-category-count>1</strong></div>
            <div data-category-list></div>
          </aside>

          <section class="builder-editor" data-category-editor aria-live="polite"></section>

          <aside class="builder-preview">
            <div class="builder-preview__head"><div><small>即時預覽</small><h2>產生結果</h2></div><span data-validity-badge>尚未完成</span></div>
            <div data-derived-preview></div>
            <pre><code data-json-preview></code></pre>
            <p data-builder-message>所有處理都留在瀏覽器中。</p>
          </aside>
        </div>
      </section>
    </main>

    <footer class="site-footer"><a class="brand" href="./"><span class="brand-mark"><img src="./logo.svg" alt="" /></span></a><p>依真實 schema 產生可提交的分類設定。</p><div><a href="./docs/configuration.html">設定文件</a><a href="https://github.com/tavricccc/novae">GitHub</a></div></footer>
  </body>
</html>
